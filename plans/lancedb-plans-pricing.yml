specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: LanceDB
providerId: lancedb
created: '2026-05-25'
modified: '2026-05-25'
tags:
  - Vector Database
  - Multimodal
  - Lance Format
  - Lakehouse
  - RAG
  - Open Source
description: >-
  LanceDB ships in three distinct commercial postures. LanceDB OSS is Apache
  2.0 with no commercial gate. LanceDB Cloud is a usage-priced managed service
  with a free developer tier and a contact-sales business tier. LanceDB
  Enterprise is a custom-priced lakehouse with deployment in customer VPC.
  Detailed list prices are not publicly disclosed; the structure below reflects
  the published tier names and gating model. Reconcile usage rates with the
  current LanceDB sales quote.
plans:
  - id: lancedb-oss
    name: LanceDB OSS
    type: free
    description: >-
      Apache 2.0 licensed embedded library. Run on any infrastructure with
      object storage (S3, GCS, Azure Blob, local disk). No price, no quota,
      no support SLA.
    entries:
      - label: License
        name: license
        type: feature
        value: Apache-2.0
      - label: API Requests
        name: api_requests
        type: quota
        metric: requests
        limit: unlimited
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    references:
      - name: GitHub Repository
        url: https://github.com/lancedb/lancedb
      - name: License
        url: https://github.com/lancedb/lancedb/blob/main/LICENSE
  - id: lancedb-cloud-free
    name: LanceDB Cloud Free
    type: freemium
    description: >-
      Free developer tier of LanceDB Cloud for evaluation and small
      production workloads. Capped storage, query rate, and table size.
    entries:
      - label: Hosted Storage
        name: storage_included
        type: quota
        metric: gigabytes
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
      - label: Query Rate
        name: query_rate
        type: rate
        metric: requests_per_second
        limit: 10
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
      - label: Support
        name: support
        type: feature
        value: Community (Discord)
    references:
      - name: LanceDB Cloud
        url: https://lancedb.com/
      - name: Documentation
        url: https://docs.lancedb.com/
  - id: lancedb-cloud-business
    name: LanceDB Cloud Business
    type: usage
    description: >-
      Production tier of LanceDB Cloud with elastic storage and query
      capacity, multi-region replication, and SOC 2 / GDPR / HIPAA controls.
      Priced by storage, query, and index-build units. Contact sales for
      a quote.
    entries:
      - label: Hosted Storage
        name: hosted_storage
        type: usage
        metric: gigabyte_month
        priceModel: contact-sales
      - label: Queries
        name: queries
        type: usage
        metric: million_requests
        priceModel: contact-sales
      - label: Index Build
        name: index_build
        type: usage
        metric: cpu_hour
        priceModel: contact-sales
      - label: Support
        name: support
        type: feature
        value: Business hours, SOC 2 / GDPR / HIPAA
    references:
      - name: Contact Sales
        url: https://lancedb.com/contact
      - name: Trust Center
        url: https://trust.lancedb.com/
  - id: lancedb-enterprise
    name: LanceDB Enterprise
    type: contract
    description: >-
      Distributed multimodal lakehouse deployable in customer VPC on AWS,
      GCP, or Azure. Includes curation, Python UDF feature engineering,
      GPU-accelerated index build (cuVS), materialized views, and direct
      PyTorch / Ray training integration. Annual contract; contact sales
      for pricing.
    entries:
      - label: Deployment
        name: deployment
        type: feature
        value: Customer VPC (AWS, GCP, Azure)
      - label: GPU Index Build
        name: gpu_index_build
        type: feature
        value: cuVS-backed
      - label: Materialized Views
        name: materialized_views
        type: feature
        value: included
      - label: Support
        name: support
        type: feature
        value: 24/7 with named TAM
      - label: Pricing
        name: pricing
        type: contract
        priceModel: annual-contract
    references:
      - name: Enterprise Documentation
        url: https://docs.lancedb.com/enterprise/
      - name: Contact Sales
        url: https://lancedb.com/contact
