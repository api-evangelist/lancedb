specification: API Commons FinOps
specificationVersion: '0.1'
focusVersion: '1.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/FinOps
provider: LanceDB
providerId: lancedb
created: '2026-05-25'
modified: '2026-05-25'
description: >-
  FinOps framing for the LanceDB billing surface. Only LanceDB Cloud and
  LanceDB Enterprise generate provider charges; LanceDB OSS shifts cost to
  the customer's own compute and object storage. Cost dimensions below are
  aligned with the FinOps Framework / FOCUS 1.1 data spec.
billableEntities:
  - id: hosted-storage
    name: Hosted Lance Storage
    description: Gigabyte-month of customer data persisted in LanceDB Cloud (Lance format on backing object store).
    focusServiceCategory: Storage
    focusChargeCategory: Usage
    pricingUnit: gigabyte-month
    sku: lancedb-cloud-storage
    visibility: contact-sales
  - id: query-requests
    name: Query and Index Requests
    description: Lance Namespace REST requests (vector / FTS / hybrid / SQL / management).
    focusServiceCategory: AI and Machine Learning
    focusChargeCategory: Usage
    pricingUnit: million-requests
    sku: lancedb-cloud-queries
    visibility: contact-sales
  - id: index-build
    name: Vector Index Build
    description: CPU/GPU-hours spent building IVF / HNSW / PQ indexes; GPU build uses NVIDIA cuVS in Enterprise.
    focusServiceCategory: AI and Machine Learning
    focusChargeCategory: Usage
    pricingUnit: cpu-hour | gpu-hour
    sku: lancedb-cloud-index-build
    visibility: contact-sales
  - id: enterprise-contract
    name: LanceDB Enterprise Contract
    description: Annual contract for VPC-deployed LanceDB Enterprise (control plane + license).
    focusServiceCategory: AI and Machine Learning
    focusChargeCategory: Commitment
    pricingUnit: annual-contract
    sku: lancedb-enterprise
    visibility: contact-sales
costAllocationDimensions:
  - namespace
  - table
  - region
  - environment-tag
  - tenant
chargebackSupport:
  enabled: partial
  notes: >-
    Cloud invoices roll up to the tenant; finer namespace / table allocation
    is available via usage reports on Business tier. Enterprise deployments
    pass through underlying object-store and compute charges directly to the
    customer's cloud account.
references:
  - name: LanceDB Pricing & Sales
    url: https://lancedb.com/contact
  - name: Trust Center
    url: https://trust.lancedb.com/
  - name: FOCUS Data Spec
    url: https://focus.finops.org/
